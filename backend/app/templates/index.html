<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryCards</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #09090b; color: #e4e4e7; min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #18181b 0%, #1e1b4b 100%);
            border-bottom: 1px solid #27272a;
            padding: 32px 0;
            text-align: center;
        }
        .header h1 {
            font-size: 2.2rem; font-weight: 700; color: #fff;
            background: linear-gradient(135deg, #a78bfa, #818cf8, #6366f1);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header p { color: #71717a; font-size: 0.9rem; margin-top: 4px; }

        .container { max-width: 960px; margin: 0 auto; padding: 24px; }

        /* Cards */
        .card {
            background: #18181b; border-radius: 16px; padding: 28px;
            margin-bottom: 20px; border: 1px solid #27272a;
            transition: border-color 0.2s;
        }
        .card:hover { border-color: #3f3f46; }
        .card-title {
            font-size: 0.85rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.05em; color: #71717a; margin-bottom: 16px;
        }

        /* Form */
        .form-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        input, select {
            background: #27272a; border: 1px solid #3f3f46; color: #e4e4e7;
            padding: 10px 14px; border-radius: 10px; font-size: 0.88rem;
            font-family: inherit; flex: 1; min-width: 140px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input::placeholder { color: #52525b; }
        input:focus, select:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }

        /* Buttons */
        button {
            font-family: inherit; border: none; padding: 10px 22px;
            border-radius: 10px; font-size: 0.88rem; font-weight: 500;
            cursor: pointer; transition: all 0.2s; display: inline-flex;
            align-items: center; gap: 6px;
        }
        .btn-primary { background: #6366f1; color: #fff; }
        .btn-primary:hover { background: #4f46e5; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99,102,241,0.3); }
        .btn-danger { background: #27272a; color: #f87171; border: 1px solid #3f3f46; }
        .btn-danger:hover { background: #dc2626; color: #fff; border-color: #dc2626; }
        .btn-generate { background: #059669; color: #fff; }
        .btn-generate:hover { background: #047857; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(5,150,105,0.3); }
        .btn-ghost { background: transparent; color: #a1a1aa; border: 1px solid #3f3f46; }
        .btn-ghost:hover { background: #27272a; color: #fff; }
        .btn-sm { padding: 7px 14px; font-size: 0.8rem; }
        button:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

        /* Story List */
        .story-grid { display: grid; gap: 10px; }
        .story-item {
            display: flex; align-items: center; gap: 14px;
            padding: 12px 16px; background: #27272a; border-radius: 12px;
            cursor: pointer; transition: all 0.2s; border: 1px solid transparent;
        }
        .story-item:hover { background: #2d2d32; border-color: #6366f1; transform: translateX(4px); }
        .story-cover {
            width: 52px; height: 72px; border-radius: 8px; object-fit: cover;
            background: linear-gradient(135deg, #1e1b4b, #27272a); flex-shrink: 0;
        }
        .story-cover-placeholder {
            width: 52px; height: 72px; border-radius: 8px; flex-shrink: 0;
            background: linear-gradient(135deg, #1e1b4b, #27272a);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; color: #52525b;
        }
        .story-item .info { flex: 1; min-width: 0; }
        .story-item .title { font-weight: 600; color: #f4f4f5; font-size: 0.95rem; }
        .story-item .meta { font-size: 0.78rem; color: #71717a; margin-top: 4px; display: flex; align-items: center; gap: 8px; }
        .story-item .actions { display: flex; gap: 6px; }
        .badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 3px 10px; border-radius: 6px; font-size: 0.7rem;
            font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
        }
        .badge-book { background: #1e3a5f; color: #93c5fd; }
        .badge-movie { background: #5f1e1e; color: #fca5a5; }
        .badge-anime { background: #1e5f3a; color: #86efac; }
        .badge-show { background: #5f4b1e; color: #fcd34d; }

        /* Detail Panel */
        .detail-panel { display: none; }
        .detail-panel.active { display: block; }

        .detail-header {
            display: flex; align-items: flex-start; gap: 20px;
            margin-bottom: 20px; flex-wrap: wrap;
        }
        .detail-cover {
            width: 120px; height: 170px; border-radius: 12px; object-fit: cover;
            flex-shrink: 0; box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            background: linear-gradient(135deg, #1e1b4b, #27272a);
        }
        .detail-cover-placeholder {
            width: 120px; height: 170px; border-radius: 12px; flex-shrink: 0;
            background: linear-gradient(135deg, #1e1b4b, #27272a);
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; color: #52525b;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        }
        .detail-info { flex: 1; min-width: 0; }
        .detail-header h2 { font-size: 1.5rem; font-weight: 700; color: #fff; }
        .detail-header .desc { color: #71717a; font-size: 0.88rem; margin-top: 4px; }
        .detail-header .author { color: #a1a1aa; font-size: 0.85rem; margin-top: 2px; }

        .generate-bar {
            display: flex; align-items: center; gap: 10px;
            padding: 16px 18px; background: #27272a; border-radius: 12px;
            margin-bottom: 20px; flex-wrap: wrap;
        }
        .generate-bar select { flex: 0; min-width: 70px; }
        .generate-bar .label { color: #71717a; font-size: 0.82rem; }

        /* Section Cards */
        .sections-grid { display: grid; gap: 16px; }
        .section-card {
            background: #18181b; border-radius: 16px; overflow: hidden;
            border: 1px solid #27272a; transition: all 0.3s;
        }
        .section-card:hover { border-color: #3f3f46; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
        .section-card img {
            width: 100%; height: 320px; object-fit: cover; display: block;
            background: linear-gradient(135deg, #18181b, #27272a);
        }
        .section-body { padding: 20px; }
        .section-number {
            display: inline-flex; align-items: center; justify-content: center;
            width: 28px; height: 28px; border-radius: 8px;
            background: #6366f1; color: #fff; font-size: 0.78rem; font-weight: 700;
            margin-bottom: 8px;
        }
        .section-title { font-weight: 600; color: #f4f4f5; font-size: 1.05rem; margin-bottom: 8px; }
        .section-text { color: #a1a1aa; font-size: 0.9rem; line-height: 1.65; }
        .image-prompt { color: #52525b; font-size: 0.75rem; margin-top: 12px; font-style: italic; display: flex; align-items: flex-start; gap: 6px; }
        .img-placeholder {
            width: 100%; height: 220px;
            background: linear-gradient(135deg, #18181b, #1e1b4b);
            display: flex; align-items: center; justify-content: center;
            color: #3f3f46; font-size: 0.85rem;
        }

        /* Jobs */
        .jobs-list { display: grid; gap: 8px; }
        .job-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 16px; background: #27272a; border-radius: 10px;
            border-left: 3px solid #3f3f46;
        }
        .job-item.job-completed { border-left-color: #4ade80; }
        .job-item.job-processing { border-left-color: #60a5fa; }
        .job-item.job-pending { border-left-color: #facc15; }
        .job-item.job-failed { border-left-color: #f87171; }
        .job-status-badge {
            padding: 3px 10px; border-radius: 6px; font-size: 0.72rem;
            font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
        }
        .job-status-badge.completed { background: #052e16; color: #4ade80; }
        .job-status-badge.processing { background: #172554; color: #60a5fa; }
        .job-status-badge.pending { background: #422006; color: #facc15; }
        .job-status-badge.failed { background: #450a0a; color: #f87171; }
        .job-meta { font-size: 0.82rem; color: #71717a; display: flex; align-items: center; gap: 8px; }
        .job-error { color: #f87171; font-size: 0.78rem; margin-top: 6px; max-width: 500px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .loading {
            display: inline-block; width: 14px; height: 14px;
            border: 2px solid #3f3f46; border-top-color: #6366f1;
            border-radius: 50%; animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .empty-state {
            text-align: center; color: #52525b; padding: 48px 24px;
            font-size: 0.9rem;
        }
        .empty-state .icon { font-size: 2rem; margin-bottom: 12px; display: block; }

        .divider { height: 1px; background: #27272a; margin: 16px 0; }

        /* Audio Player */
        .audio-player {
            display: flex; align-items: center; gap: 10px;
            margin-top: 12px; padding: 10px 14px;
            background: #27272a; border-radius: 10px;
        }
        .audio-player audio {
            flex: 1; height: 32px;
            filter: invert(1) hue-rotate(180deg) brightness(0.8);
        }
        .audio-label { color: #71717a; font-size: 0.75rem; white-space: nowrap; }

        .btn-reset { background: #27272a; color: #f59e0b; border: 1px solid #3f3f46; }
        .btn-reset:hover { background: #78350f; color: #fcd34d; border-color: #78350f; }

        /* Fade-in animation */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out; }

        /* Responsive */
        @media (max-width: 640px) {
            .container { padding: 16px; }
            .card { padding: 20px; }
            .form-row { flex-direction: column; }
            .generate-bar { flex-direction: column; align-items: stretch; }
            .detail-header { flex-direction: column; }
            .section-card img { height: 200px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>StoryCards</h1>
    <p>AI-generated visual story cards from your favorite stories</p>
</div>

<div class="container">
    <!-- Create Story -->
    <div class="card fade-in">
        <div class="card-title">Create a Story</div>
        <form id="createForm">
            <div class="form-row">
                <input id="storyTitle" placeholder="Story title (e.g. Harry Potter)" required>
                <select id="storyType">
                    <option value="book">📖 Book</option>
                    <option value="movie">🎬 Movie</option>
                    <option value="anime">🎌 Anime</option>
                    <option value="show">📺 TV Show</option>
                </select>
            </div>
            <div class="form-row">
                <input id="storyAuthor" placeholder="Author / Director (optional)">
                <input id="storyDesc" placeholder="Brief description (optional)">
            </div>
            <button type="submit" class="btn-primary">Add Story</button>
        </form>
    </div>

    <!-- Story List Panel -->
    <div id="listPanel">
        <div class="card">
            <div class="card-title">Your Stories</div>
            <div id="storyList" class="story-grid"></div>
        </div>
    </div>

    <!-- Story Detail Panel -->
    <div id="detailPanel" class="detail-panel">
        <button class="btn-ghost btn-sm" onclick="showList()" style="margin-bottom: 16px;">← Back to stories</button>

        <div class="card fade-in">
            <div class="detail-header">
                <div id="detailCover"></div>
                <div class="detail-info">
                    <h2 id="detailTitle"></h2>
                    <p id="detailAuthor" class="author"></p>
                    <p id="detailDesc" class="desc"></p>
                    <div style="margin-top: 8px;" id="detailBadge"></div>
                </div>
            </div>

            <!-- Jobs -->
            <div id="jobsSection">
                <div class="card-title">Generation Jobs</div>
                <div id="jobsList" class="jobs-list"></div>
            </div>

            <div class="divider" style="margin: 20px 0;"></div>

            <!-- Sections -->
            <div class="card-title">Story Cards</div>
            <div id="sectionsList" class="sections-grid"></div>
        </div>
    </div>
</div>

<script>
const API = '/api/stories';
let currentStoryUid = null;
let pollInterval = null;

// --- API Helpers ---
async function api(url, options = {}) {
    const res = await fetch(url, {
        headers: { 'Content-Type': 'application/json' },
        ...options,
    });
    if (res.status === 204) return null;
    if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || 'Request failed');
    }
    return res.json();
}

// --- Story List ---
async function loadStories() {
    const stories = await api(API);
    const el = document.getElementById('storyList');
    if (!stories.length) {
        el.innerHTML = '<div class="empty-state"><span class="icon">📚</span>No stories yet. Create one above!</div>';
        return;
    }

    el.innerHTML = stories.map(s => `
        <div class="story-item" onclick="showDetail('${s.uid}')">
            ${s.cover_image
                ? `<img class="story-cover" src="${esc(s.cover_image)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'story-cover-placeholder\\'>${typeIcon(s.story_type)}</div>'">`
                : `<div class="story-cover-placeholder">${typeIcon(s.story_type)}</div>`}
            <div class="info">
                <span class="title">${esc(s.title)}</span>
                <div class="meta">
                    <span class="badge badge-${s.story_type}">${typeIcon(s.story_type)} ${s.story_type}</span>
                    ${s.author ? `<span>by ${esc(s.author)}</span>` : ''}
                    <span>${new Date(s.created_at).toLocaleDateString()}</span>
                </div>
            </div>
            <div class="actions">
                <button class="btn-danger btn-sm" onclick="event.stopPropagation(); deleteStory('${s.uid}')">Delete</button>
            </div>
        </div>
    `).join('');
}

function typeIcon(type) {
    return { book: '📖', movie: '🎬', anime: '🎌', show: '📺' }[type] || '📝';
}

// --- Create Story ---
document.getElementById('createForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    btn.disabled = true;
    try {
        await api(API, {
            method: 'POST',
            body: JSON.stringify({
                title: document.getElementById('storyTitle').value,
                story_type: document.getElementById('storyType').value,
                author: document.getElementById('storyAuthor').value || null,
                description: document.getElementById('storyDesc').value || null,
            }),
        });
        e.target.reset();
        await loadStories();
    } catch (err) { alert(err.message); }
    btn.disabled = false;
});

// --- Delete Story ---
async function deleteStory(uid) {
    if (!confirm('Delete this story and all its cards?')) return;
    await api(`${API}/${uid}`, { method: 'DELETE' });
    await loadStories();
}

// --- Story Detail ---
async function showDetail(uid) {
    currentStoryUid = uid;
    document.getElementById('listPanel').style.display = 'none';
    document.getElementById('detailPanel').classList.add('active');

    const story = await api(`${API}/${uid}`);
    document.getElementById('detailTitle').textContent = story.title;
    document.getElementById('detailAuthor').textContent = story.author ? `by ${story.author}` : '';
    document.getElementById('detailDesc').textContent = story.description || '';
    document.getElementById('detailBadge').innerHTML =
        `<span class="badge badge-${story.story_type}">${typeIcon(story.story_type)} ${story.story_type}</span>`;

    // Cover image
    const coverEl = document.getElementById('detailCover');
    if (story.cover_image) {
        coverEl.innerHTML = `<img class="detail-cover" src="${esc(story.cover_image)}" alt="" onerror="this.outerHTML='<div class=\\'detail-cover-placeholder\\'>${typeIcon(story.story_type)}</div>'">`;
    } else {
        coverEl.innerHTML = `<div class="detail-cover-placeholder">${typeIcon(story.story_type)}</div>`;
    }

    // Only show sections that have actual content (successfully generated)
    const validSections = (story.sections || []).filter(s => s.title && s.text);

    // If we have sections, load full data (with media) from dedicated endpoint
    if (validSections.length > 0) {
        const fullSections = await api(`${API}/${uid}/sections`);
        renderSections(fullSections.filter(s => s.title && s.text));
    } else {
        renderSections([]);
    }

    await loadJobs();

    // Auto-poll if there are active jobs (triggered via CLI)
    const jobs = await api(`${API}/${uid}/jobs`);
    const hasActive = jobs.some(j => j.status === 'pending' || j.status === 'processing');
    if (hasActive) startPolling();
}

function showList() {
    currentStoryUid = null;
    clearPolling();
    document.getElementById('listPanel').style.display = 'block';
    document.getElementById('detailPanel').classList.remove('active');
    loadStories();
}

// --- Sections ---
function renderSections(sections) {
    const el = document.getElementById('sectionsList');
    if (!sections.length) {
        el.innerHTML = '<div class="empty-state"><span class="icon">🂴</span>No cards generated yet. Generation is managed via CLI.</div>';
        return;
    }

    el.innerHTML = sections.map(s => `
        <div class="section-card fade-in">
            ${s.image_url
                ? `<img src="${s.image_url}" alt="${esc(s.title)}" loading="lazy" onerror="this.outerHTML='<div class=\\'img-placeholder\\'>Image unavailable</div>'">`
                : `<div class="img-placeholder">No image generated</div>`}
            <div class="section-body">
                <div class="section-number">${s.section_index}</div>
                <div class="section-title">${esc(s.title)}</div>
                <div class="section-text">${esc(s.text)}</div>
                ${s.image_prompt ? `<div class="image-prompt"><span>🎨</span> <span>${esc(s.image_prompt)}</span></div>` : ''}
                ${s.audio_url ? `
                    <div class="audio-player">
                        <span class="audio-label">🔊 Listen</span>
                        <audio controls preload="none" src="${s.audio_url}"></audio>
                    </div>
                ` : ''}
            </div>
        </div>
    `).join('');
}

// --- Generation is CLI-only, no UI trigger ---

// --- Reset Story ---
async function resetStory() {
    if (!currentStoryUid) return;
    if (!confirm('Clear all cards, jobs, and audio for this story? This cannot be undone.')) return;
    try {
        await api(`${API}/${currentStoryUid}/reset`, { method: 'DELETE' });
        renderSections([]);
        await loadJobs();
    } catch (err) { alert(err.message); }
}

async function loadJobs() {
    if (!currentStoryUid) return;
    const jobs = await api(`${API}/${currentStoryUid}/jobs`);
    const el = document.getElementById('jobsList');

    // Only show completed and actively running jobs (hide failed)
    const visibleJobs = jobs.filter(j => j.status !== 'failed');

    if (!visibleJobs.length && !jobs.length) {
        el.innerHTML = '<div class="empty-state" style="padding:16px;">No generation jobs yet.</div>';
        return;
    }

    // Show all jobs but style failed ones subtly
    el.innerHTML = jobs.map(j => `
        <div class="job-item job-${j.status}">
            <div>
                <span class="job-status-badge ${j.status}">${j.status}</span>
                ${j.error_message ? `<div class="job-error" title="${esc(j.error_message)}">⚠ ${esc(j.error_message)}</div>` : ''}
            </div>
            <div class="job-meta">
                <span>${j.generated_sections}/${j.total_sections} sections</span>
                ${j.status === 'processing' || j.status === 'pending' ? '<span class="loading"></span>' : ''}
            </div>
        </div>
    `).join('');

    // If any job completed, reload sections to show the new ones
    const hasActive = jobs.some(j => j.status === 'pending' || j.status === 'processing');
    if (!hasActive) {
        clearPolling();
        const fullSections = await api(`${API}/${currentStoryUid}/sections`);
        renderSections(fullSections.filter(s => s.title && s.text));
    }
}

function startPolling() {
    clearPolling();
    pollInterval = setInterval(loadJobs, 3000);
}

function clearPolling() {
    if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
}

function esc(s) {
    if (!s) return '';
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

// Init
loadStories();
</script>
</body>
</html>
